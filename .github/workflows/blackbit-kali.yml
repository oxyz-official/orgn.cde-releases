name: blackbit-kali-image

# Builds the Blackbit Kali toolset image (arm64) and publishes it to GHCR.
# Uses a PAT secret GHCR_PAT (write:packages) — the enterprise disables write
# permissions for the default GITHUB_TOKEN, so a user PAT is required to push.
# Dispatch-only so editing this file doesn't kick off a build before the secret
# is set: run via `gh workflow run blackbit-kali-image` or the Actions UI.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR (PAT)
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u oxyz-official --password-stdin
      - name: Build and push (linux/arm64)
        run: |
          IMG=ghcr.io/oxyz-official/blackbit-kali
          docker build --platform=linux/arm64 \
            --label org.opencontainers.image.source=https://github.com/oxyz-official/orgn.cde-releases \
            -t "$IMG:lean" -t "$IMG:latest" blackbit-kali
          docker push "$IMG:lean"
          docker push "$IMG:latest"
          echo "### Published" >> "$GITHUB_STEP_SUMMARY"
          docker inspect --format='`{{index .RepoDigests 0}}`' "$IMG:lean" >> "$GITHUB_STEP_SUMMARY"
